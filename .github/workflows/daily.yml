name: Daily FX paper trading update

on:
  schedule:
    # 22:00 UTC, Monday-Friday. Yahoo Finance daily FX bars are typically
    # available by then, and the script no-ops if no new feature row exists.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        run: python daily_update.py

      - name: Commit updated logs/state/model
        run: |
          git config user.name "fx-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Daily FX paper trading update [skip ci]"
          git push
